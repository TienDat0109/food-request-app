    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 { font-size: 1.8rem; margin-bottom: 6px; }
    .header p { color: #777; font-size: 0.9rem; }

    /* TABS */
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 20px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      border-radius: 20px;
      padding: 8px 16px;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn:hover { border-color: #555; color: #fff; }
    .tab-btn.active {
      background: #1a1a1a;
      border-color: #f97316;
      color: #f97316;
      font-weight: 600;
    }

    /* FOOD GRID */
    .category-panel { display: none; }
    .category-panel.active { display: block; }

    .category-title {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: 0 auto;
    }

    @media (max-width: 380px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    .food-btn {
      background: #141414;
      border: 2px solid #252525;
      border-radius: 14px;
      padding: 14px 8px;
      font-size: 0.82rem;
      color: #ccc;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
      line-height: 1.4;
    }
    .food-btn:hover { border-color: #f97316; color: #fff; background: #1c1208; }
    .food-btn.selected {
      border-color: #f97316;
      background: #221508;
      color: #fff;
      transform: scale(1.04);
    }
    .food-btn .emoji {
      font-size: 1.7rem;
      display: block;
      margin-bottom: 6px;
    }

    /* BOTTOM SECTION */
    .bottom {
      max-width: 600px;
      margin: 24px auto 0;
    }

    textarea {
      width: 100%;
      background: #141414;
      border: 2px solid #252525;
      border-radius: 12px;
      padding: 12px 14px;
      color: #fff;
      font-size: 0.95rem;
      resize: none;
      height: 76px;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: #444; }
    textarea:focus { outline: none; border-color: #f97316; }

    .selected-preview {
      margin-top: 12px;
      padding: 10px 14px;
      background: #1a1a1a;
      border-radius: 10px;
      font-size: 0.9rem;
      color: #888;
      min-height: 42px;
      border: 1px solid #222;
    }
    .selected-preview span { color: #f97316; font-weight: 600; }

    .send-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .send-btn:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
    .send-btn:active:not(:disabled) { transform: scale(0.98); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .status {
      text-align: center;
      margin-top: 14px;
      font-size: 0.9rem;
      min-height: 22px;
    }
    .status.success { color: #4ade80; }
    .status.error { color: #f87171; }

    let selected = null;

    // Build tabs + panels
    const tabBar   = document.getElementById("tabBar");
    const panelsEl = document.getElementById("panels");

    categories.forEach((cat, ci) => {
      // Tab button
      const tab = document.createElement("button");
      tab.className = "tab-btn" + (ci === 0 ? " active" : "");
      tab.textContent = cat.label;
      tab.onclick = () => switchTab(cat.id);
      tabBar.appendChild(tab);

      // Panel
      const panel = document.createElement("div");
      panel.className = "category-panel" + (ci === 0 ? " active" : "");
      panel.id = "panel-" + cat.id;

      const grid = document.createElement("div");
      grid.className = "grid";

      cat.items.forEach(food => {
        const btn = document.createElement("button");
        btn.className = "food-btn";
        btn.innerHTML = `<span class="emoji">${food.emoji}</span>${food.name}`;
        btn.onclick = () => selectFood(food, btn);
        grid.appendChild(btn);
      });

      panel.appendChild(grid);
      panelsEl.appendChild(panel);
    });

    function switchTab(id) {
      document.querySelectorAll(".tab-btn").forEach((t, i) => {
        t.classList.toggle("active", categories[i].id === id);
      });
      document.querySelectorAll(".category-panel").forEach(p => {
        p.classList.toggle("active", p.id === "panel-" + id);
      });
    }

    function selectFood(food, btn) {
      document.querySelectorAll(".food-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = food;
      document.getElementById("preview").innerHTML =
        `Đã chọn: <span>${food.emoji} ${food.name}</span>`;
      document.getElementById("sendBtn").disabled = false;
    }

    async function sendRequest() {
      const note   = document.getElementById("note").value.trim();
      const btn    = document.getElementById("sendBtn");
      const status = document.getElementById("status");

      let message = `🍽️ *Yêu cầu món ăn mới!*\n\n`;
      message += `Món: *${selected.emoji} ${selected.name}*`;
      if (note) message += `\nGhi chú: _${note}_`;
      message += `\n\n_Gửi từ app đặt món_ 💌`;

      btn.disabled = true;
      status.textContent = "Đang gửi...";
      status.className = "status";

      try {
        const res = await fetch(
          `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              chat_id: CHAT_ID,
              text: message,
              parse_mode: "Markdown"
            })
          }
        );
        const data = await res.json();
        if (data.ok) {
          status.textContent = "✅ Đã gửi! Chờ anh nhé~";
          status.className = "status success";
          // Reset sau 3s
          setTimeout(() => {
            status.textContent = "";
            status.className = "status";
            btn.disabled = false;
          }, 3000);
        } else {
          throw new Error(data.description);
        }
      } catch (err) {
        status.textContent = "❌ Gửi thất bại: " + err.message;
        status.className = "status error";
        btn.disabled = false;
      }
    }
