<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hôm nay ăn gì? 🍜</title>
  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Ăn Gì Thế?"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#090612"/>
  <link rel="manifest" href="manifest.json"/>
  <!-- iOS icon -->
  <link rel="apple-touch-icon" href="icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent:#c8845a; --accent2:#e8a87c;
      --text:#f0e6dc; --muted:#8a7060;
      --surface:rgba(18,12,8,0.75); --surface2:rgba(30,18,10,0.88);
      --border:rgba(200,132,90,0.18); --border2:rgba(200,132,90,0.38);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; color:var(--text); min-height:100vh; padding-bottom:56px; overflow-x:hidden; }

    /* BG */
    .bg { position:fixed; inset:0; z-index:0;
      background: radial-gradient(ellipse 120% 60% at 50% 0%, #1a0a2e 0%, transparent 65%),
        radial-gradient(ellipse 80% 50% at 10% 30%, #0d1a2e 0%, transparent 60%),
        radial-gradient(ellipse 70% 40% at 90% 70%, #1e0a18 0%, transparent 55%),
        linear-gradient(160deg,#090612 0%,#0e0808 40%,#120a04 70%,#0a0608 100%);
    }
    .stars,.bokeh-layer,.petals-layer { position:fixed; inset:0; overflow:hidden; pointer-events:none; }
    .stars { z-index:1; } .bokeh-layer { z-index:2; } .petals-layer { z-index:3; }
    .star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d,3s) ease-in-out infinite alternate; animation-delay:var(--delay,0s); }
    @keyframes twinkle { 0%{opacity:var(--o1,.2);transform:scale(1)} 100%{opacity:var(--o2,.8);transform:scale(1.3)} }
    .bokeh { position:absolute; border-radius:50%; filter:blur(var(--blur,20px)); animation:drift var(--d,8s) ease-in-out infinite alternate; animation-delay:var(--delay,0s); }
    @keyframes drift { 0%{transform:translate(0,0) scale(1);opacity:var(--o1,.15)} 100%{transform:translate(var(--tx,10px),var(--ty,-15px)) scale(var(--s,1.1));opacity:var(--o2,.25)} }
    .petal { position:absolute; top:-20px; opacity:0; animation:fall var(--d,8s) linear infinite; animation-delay:var(--delay,0s); }
    @keyframes fall { 0%{transform:translateX(0) rotate(0deg) scale(.8);opacity:0;top:-20px} 10%{opacity:var(--o,.4)} 90%{opacity:var(--o,.4)} 100%{transform:translateX(var(--tx,60px)) rotate(var(--r,360deg)) scale(1);opacity:0;top:110vh} }

    .content { position:relative; z-index:10; }

    /* HEADER */
    .header { display:flex; flex-direction:column; align-items:center; padding:44px 20px 30px; position:relative; }
    .header::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:180px; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
    .couple-wrap { position:relative; width:108px; height:108px; margin-bottom:16px; }
    .couple-wrap img { width:108px; height:108px; border-radius:50%; object-fit:cover; object-position:center top; border:2px solid var(--accent); box-shadow:0 0 0 5px rgba(200,132,90,.1),0 0 30px rgba(200,132,90,.25),0 12px 40px rgba(0,0,0,.6); display:block; }
    .couple-wrap::before { content:'♥'; position:absolute; bottom:2px; right:2px; width:24px; height:24px; background:#120a04; border:1px solid var(--accent); border-radius:50%; font-size:10px; color:var(--accent); line-height:24px; text-align:center; }
    .names { font-family:'Playfair Display',serif; font-size:.88rem; color:var(--muted); margin-bottom:8px; }
    .names span { color:var(--accent2); }
    .header h1 { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:500; text-align:center; line-height:1.3; }
    .header h1 em { font-style:italic; color:var(--accent2); }
    .header-sub { margin-top:7px; font-size:.72rem; color:var(--muted); letter-spacing:1.2px; text-transform:uppercase; }

    /* TABS */
    .tabs { display:flex; gap:6px; overflow-x:auto; padding:22px 16px 0; max-width:640px; margin:0 auto; scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab-btn { flex-shrink:0; background:var(--surface); backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:20px; padding:7px 15px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:.78rem; cursor:pointer; transition:all .22s; white-space:nowrap; }
    .tab-btn:hover { border-color:var(--accent); color:var(--accent2); }
    .tab-btn.active { background:rgba(200,132,90,.15); border-color:var(--accent); color:var(--accent2); font-weight:500; }

    /* GRID */
    .category-panel { display:none; }
    .category-panel.active { display:block; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; max-width:640px; margin:14px auto 0; padding:0 16px; }
    @media(max-width:360px){ .grid{grid-template-columns:repeat(2,1fr)} }
    .food-btn { background:var(--surface); backdrop-filter:blur(10px); border:1px solid var(--border); border-radius:12px; padding:13px 8px; font-size:.78rem; font-family:'DM Sans',sans-serif; color:var(--muted); cursor:pointer; transition:all .2s; text-align:center; line-height:1.4; position:relative; }
    .food-btn:hover { border-color:var(--border2); color:var(--text); background:rgba(30,18,10,.9); }
    .food-btn.selected { border-color:var(--accent); background:rgba(200,132,90,.12); color:var(--text); box-shadow:0 0 16px rgba(200,132,90,.15); }
    .food-btn .emoji { font-size:1.55rem; display:block; margin-bottom:5px; }
    .has-location::after { content:'📍'; position:absolute; top:6px; right:7px; font-size:.6rem; opacity:.6; }

    /* BOTTOM */
    .bottom { max-width:640px; margin:22px auto 0; padding:0 16px; }
    .selected-preview { padding:11px 14px; background:var(--surface); backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:10px; font-size:.85rem; color:var(--muted); margin-bottom:10px; min-height:40px; font-style:italic; }
    .selected-preview b { color:var(--accent2); font-weight:500; font-style:normal; }
    textarea { width:100%; background:var(--surface); backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.88rem; resize:none; height:72px; transition:border-color .2s; margin-bottom:12px; }
    textarea::placeholder { color:var(--muted); font-style:italic; font-size:.82rem; }
    textarea:focus { outline:none; border-color:var(--accent); }
    .send-btn { display:block; width:100%; background:linear-gradient(135deg,#c8845a 0%,#a0623c 100%); color:#fff; border:none; border-radius:12px; padding:17px; font-family:'DM Sans',sans-serif; font-size:.92rem; font-weight:500; letter-spacing:.8px; text-transform:uppercase; cursor:pointer; transition:all .22s; box-shadow:0 4px 20px rgba(200,132,90,.2); }
    .send-btn:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 8px 28px rgba(200,132,90,.35); }
    .send-btn:disabled { opacity:.25; cursor:not-allowed; background:#333; box-shadow:none; }
    .status { text-align:center; margin-top:12px; font-size:.82rem; min-height:20px; font-style:italic; }
    .status.success { color:#7ec89a; } .status.error { color:#c25b5b; }
    .divider { width:40px; height:1px; background:var(--border); margin:20px auto 0; }

    /* POPUP */
    .popup-overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.7); backdrop-filter:blur(4px); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
    .popup-overlay.show { opacity:1; pointer-events:all; }
    .popup { background:linear-gradient(160deg,#1a1008 0%,#120c06 100%); border:1px solid var(--border2); border-bottom:none; border-radius:20px 20px 0 0; width:100%; max-width:640px; padding:28px 20px 40px; transform:translateY(100%); transition:transform .3s cubic-bezier(.34,1.56,.64,1); max-height:85vh; overflow-y:auto; }
    .popup-overlay.show .popup { transform:translateY(0); }
    .popup-handle { width:40px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 20px; }
    .popup-food-name { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:500; margin-bottom:4px; }
    .popup-food-name .e { margin-right:8px; }
    .popup-subtitle { font-size:.75rem; color:var(--muted); letter-spacing:.8px; text-transform:uppercase; margin-bottom:20px; }
    .location-card { background:rgba(200,132,90,.07); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; }
    .location-card:last-child { margin-bottom:0; }
    .loc-name { font-weight:500; font-size:.92rem; color:var(--accent2); margin-bottom:4px; }
    .loc-address { font-size:.8rem; color:var(--muted); margin-bottom:10px; line-height:1.5; }
    .loc-actions { display:flex; gap:8px; }
    .loc-btn { flex:1; padding:9px; border-radius:8px; font-size:.75rem; font-family:'DM Sans',sans-serif; font-weight:500; cursor:pointer; border:none; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:5px; transition:all .2s; }
    .loc-btn.map { background:rgba(200,132,90,.2); color:var(--accent2); border:1px solid var(--border2); }
    .loc-btn.map:hover { background:rgba(200,132,90,.3); }
    .loc-btn.select { background:linear-gradient(135deg,#c8845a,#a0623c); color:#fff; }
    .loc-btn.select:hover { opacity:.9; }
    .popup-close { position:absolute; top:16px; right:20px; background:none; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; padding:4px; }
    .popup .popup-inner { position:relative; }
    .no-location { text-align:center; padding:20px; color:var(--muted); font-style:italic; font-size:.88rem; }
  </style>
</head>

      btn.onclick = () => handleFoodClick(food, btn);
      grid.appendChild(btn);
    });

    panel.appendChild(grid);
    panelsEl.appendChild(panel);
  });

  function switchTab(id) {
    document.querySelectorAll(".tab-btn").forEach((t,i) =>
      t.classList.toggle("active", categories[i].id===id));
    document.querySelectorAll(".category-panel").forEach(p =>
      p.classList.toggle("active", p.id==="panel-"+id));
  }

  function handleFoodClick(food, btn) {
    const locs = locations[food.name];
    if (locs && locs.length > 0) {
      showPopup(food, locs, btn);
    } else {
      selectFood(food, btn);
    }
  }

  function showPopup(food, locs, btn) {
    document.getElementById("popupFoodName").innerHTML =
      `<span class="e">${food.emoji}</span>${food.name}`;
    const locDiv = document.getElementById("popupLocations");
    locDiv.innerHTML = locs.map(loc => `
      <div class="location-card">
        <div class="loc-name">🏪 ${loc.name}</div>
        <div class="loc-address">📍 ${loc.address}</div>
        <div class="loc-actions">
          <a class="loc-btn map" href="${loc.map}" target="_blank">🗺️ Google Maps</a>
          <button class="loc-btn select" onclick="selectFromPopup('${food.emoji}','${food.name.replace(/'/g,"\'")}')">✓ Chọn món này</button>
        </div>
      </div>
    `).join("");
    document.getElementById("popupOverlay").classList.add("show");
    window._pendingBtn = btn;
    window._pendingFood = food;
  }

  function selectFromPopup(emoji, name) {
    closePopupDirect();
    const food = {emoji, name};
    document.querySelectorAll(".food-btn").forEach(b => b.classList.remove("selected"));
    if (window._pendingBtn) window._pendingBtn.classList.add("selected");
    selected = window._pendingFood || food;
    document.getElementById("preview").innerHTML = `Đã chọn: <b>${emoji} ${name}</b>`;
    document.getElementById("sendBtn").disabled = false;
  }

  function selectFood(food, btn) {
    document.querySelectorAll(".food-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selected = food;
    document.getElementById("preview").innerHTML = `Đã chọn: <b>${food.emoji} ${food.name}</b>`;
    document.getElementById("sendBtn").disabled = false;
  }

  function closePopup(e) {
    if (e.target === document.getElementById("popupOverlay")) closePopupDirect();
  }
  function closePopupDirect() {
    document.getElementById("popupOverlay").classList.remove("show");
  }

  async function sendRequest() {
    const note = document.getElementById("note").value.trim();
    const btn = document.getElementById("sendBtn");
    const status = document.getElementById("status");
    let msg = `🍽️ *Em Bé muốn ăn gì rồi!*\n\nMón: *${selected.emoji} ${selected.name}*`;
    if (note) msg += `\nGhi chú: _${note}_`;
    msg += `\n\n_Anh lo nhé anh yêu~ 💌_`;
    btn.disabled = true; status.textContent = "Đang gửi..."; status.className = "status";
    try {
      const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({chat_id:CHAT_ID, text:msg, parse_mode:"Markdown"})
      });
      const data = await res.json();
      if (data.ok) {
        status.textContent = "✓ Đã gửi! Chờ anh tí nhé~";
        status.className = "status success";
        setTimeout(()=>{status.textContent="";status.className="status";btn.disabled=false;},3000);
      } else throw new Error(data.description);
    } catch(err) {
      status.textContent = "❌ Gửi thất bại: "+err.message;
      status.className = "status error"; btn.disabled = false;
    }
  }

  // BG animations
  const starsEl = document.getElementById("stars");
  for(let i=0;i<120;i++){
    const s=document.createElement("div"); s.className="star";
    const sz=Math.random()*2+.5;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--o1:${(Math.random()*.3+.1).toFixed(2)};--o2:${(Math.random()*.5+.4).toFixed(2)};--d:${(Math.random()*4+2).toFixed(1)}s;--delay:-${(Math.random()*4).toFixed(1)}s;`;
    starsEl.appendChild(s);
  }
  const bokehEl=document.getElementById("bokeh");
  const bColors=["rgba(200,132,90,VAL)","rgba(180,100,120,VAL)","rgba(120,80,180,VAL)","rgba(80,120,200,VAL)","rgba(230,180,100,VAL)"];
  for(let i=0;i<18;i++){
    const b=document.createElement("div"); b.className="bokeh";
    const sz=Math.random()*80+30, c=bColors[Math.floor(Math.random()*bColors.length)];
    b.style.cssText=`left:${Math.random()*110-5}%;top:${Math.random()*120-10}%;width:${sz}px;height:${sz}px;background:${c.replace("VAL","0.6")};--blur:${Math.random()*30+15}px;--o1:${(Math.random()*.08+.04).toFixed(2)};--o2:${(Math.random()*.15+.08).toFixed(2)};--d:${(Math.random()*10+6).toFixed(1)}s;--delay:-${(Math.random()*8).toFixed(1)}s;--tx:${(Math.random()*40-20).toFixed(0)}px;--ty:${(Math.random()*40-20).toFixed(0)}px;--s:${(Math.random()*.4+.8).toFixed(2)};`;
    bokehEl.appendChild(b);
  }
  const petalsEl=document.getElementById("petals");
  const petalSVGs=[`<svg viewBox="0 0 20 24" xmlns="http://www.w3.org/2000/svg"><ellipse cx="10" cy="12" rx="7" ry="11" fill="rgba(255,192,203,VAL)" transform="rotate(-15,10,12)"/></svg>`,`<svg viewBox="0 0 18 22" xmlns="http://www.w3.org/2000/svg"><ellipse cx="9" cy="11" rx="6" ry="10" fill="rgba(255,182,193,VAL)" transform="rotate(20,9,11)"/></svg>`];
  for(let i=0;i<22;i++){
    const p=document.createElement("div"); p.className="petal";
    const sz=Math.random()*12+8, svg=petalSVGs[Math.floor(Math.random()*petalSVGs.length)];
    const op=(Math.random()*.25+.1).toFixed(2);
    p.innerHTML=svg.replace("VAL",op);
    p.querySelector("svg").style.width=sz+"px"; p.querySelector("svg").style.height=sz+"px";
    p.style.cssText=`left:${Math.random()*100}%;--d:${(Math.random()*14+8).toFixed(1)}s;--delay:-${(Math.random()*14).toFixed(1)}s;--tx:${(Math.random()*120-60).toFixed(0)}px;--r:${(Math.random()*360+180).toFixed(0)}deg;--o:${op};`;
    petalsEl.appendChild(p);
  }
</script>

  <!-- PWA Install Banner -->
  <div id="installBanner" style="
    display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    z-index:200; background:rgba(200,132,90,0.15); backdrop-filter:blur(16px);
    border:1px solid rgba(200,132,90,0.4); border-radius:16px;
    padding:14px 20px; max-width:340px; width:90%;
    font-family:'DM Sans',sans-serif; color:#f0e6dc;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
  ">
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:1.8rem;">📲</span>
      <div style="flex:1;">
        <div style="font-weight:500;font-size:.9rem;margin-bottom:2px;">Thêm vào màn hình chính</div>
        <div style="font-size:.75rem;color:#8a7060;">Dùng như app thật, không cần mở trình duyệt</div>
      </div>
      <button onclick="document.getElementById('installBanner').style.display='none'"
        style="background:none;border:none;color:#8a7060;font-size:1.1rem;cursor:pointer;padding:4px;">✕</button>
    </div>
    <button id="installBtn" style="
      display:block;width:100%;margin-top:12px;
      background:linear-gradient(135deg,#c8845a,#a0623c);
      color:#fff;border:none;border-radius:10px;padding:11px;
      font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;
      cursor:pointer;letter-spacing:.5px;
    ">Cài ngay ♥</button>
  </div>

  <script>
    // PWA Install
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').style.display = 'block';
    });
    document.getElementById('installBtn').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        document.getElementById('installBanner').style.display = 'none';
      }
    });
    window.addEventListener('appinstalled', () => {
      document.getElementById('installBanner').style.display = 'none';
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
